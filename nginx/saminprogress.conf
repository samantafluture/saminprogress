# HTTP — redirect all to HTTPS (preserving host)
server {
    listen 80;
    server_name saminprogress.tech www.saminprogress.tech blog.samantafluture.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — saminprogress.tech (primary)
server {
    listen 443 ssl;
    http2 on;
    server_name saminprogress.tech www.saminprogress.tech;

    ssl_certificate /etc/letsencrypt/live/saminprogress.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saminprogress.tech/privkey.pem;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Deploy webhook
    location = /webhook/deploy {
        proxy_pass http://unix:/tmp/saminprogress-webhook.sock:/deploy;
        proxy_set_header X-Webhook-Secret $http_x_webhook_secret;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        limit_except POST { deny all; }
    }

    # Static site
    location / {
        root /usr/share/nginx/saminprogress;
        index index.html;
        try_files $uri $uri/ $uri.html =404;
        gzip_static on;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/saminprogress;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# HTTPS — blog.samantafluture.com redirects to saminprogress.tech
server {
    listen 443 ssl;
    http2 on;
    server_name blog.samantafluture.com;

    ssl_certificate /etc/letsencrypt/live/blog.samantafluture.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.samantafluture.com/privkey.pem;

    return 301 https://saminprogress.tech$request_uri;
}
