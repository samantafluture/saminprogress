server {
    listen 80;
    server_name blog.samantafluture.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name blog.samantafluture.com;

    ssl_certificate /etc/letsencrypt/live/blog.samantafluture.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.samantafluture.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Deploy webhook (proxied to local Node.js server)
    location = /webhook/deploy {
        proxy_pass http://127.0.0.1:9000/deploy;
        proxy_set_header X-Webhook-Secret $http_x_webhook_secret;
        proxy_read_timeout 10s;
        limit_except POST { deny all; }
    }

    # Static site (no API, no SPA fallback — Astro generates all pages)
    location / {
        root /usr/share/nginx/saminprogress;
        index index.html;
        try_files $uri $uri/ $uri.html =404;
        gzip_static on;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/saminprogress;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
